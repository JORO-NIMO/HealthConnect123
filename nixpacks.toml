# Nixpacks build configuration for Railway
# Explicitly tells Railway's builder how to install and start this app
# regardless of root directory settings in the dashboard

[phases.install]
cmds = [
	"mkdir -p frontend/images && if [ -f logo.jpeg ]; then cp -f logo.jpeg frontend/images/logo.jpeg; fi",
	"cd backend && npm install --production"
]

[start]
cmd = "node backend/server.js"
