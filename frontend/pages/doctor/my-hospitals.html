<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Hospitals — HealthConnect</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#22D3EE',dark:'#0891B2'},secondary:{DEFAULT:'#10B981'}},fontFamily:{sans:['Plus Jakarta Sans','Inter','system-ui','sans-serif'],serif:['Instrument Serif','Georgia','serif']}}}}</script>
</head>
<body class="min-h-screen" style="background:var(--bg);color:var(--text)">
  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[220px] flex flex-col fixed h-full z-30 -translate-x-full lg:translate-x-0 transition-transform duration-300" style="background:var(--surface2);border-right:1px solid rgba(34,211,238,.1)">
      <div class="p-5 pb-3" style="border-bottom:1px solid var(--border)">
        <a href="/" class="flex items-center gap-2 font-bold text-lg">
          <div class="w-8 h-8 rounded-[10px] bg-[#22D3EE] flex items-center justify-center text-white text-sm">🏥</div>
          <span class="font-serif text-[18px]">HealthConnect</span>
        </a>
      </div>
      <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto">
        <a href="/pages/doctor/dashboard.html" class="sidebar-item">🏠 Dashboard</a>
        <a href="/pages/doctor/schedule.html" class="sidebar-item">📅 Schedule</a>
        <a href="/pages/doctor/dashboard.html" class="sidebar-item">👥 Patients</a>
        <a href="/pages/doctor/dashboard.html" class="sidebar-item">💊 Prescriptions</a>
        <a href="/pages/doctor/consultation.html" class="sidebar-item">📹 Consultation Room</a>
        <a href="/pages/doctor/my-hospitals.html" class="sidebar-item active">🏥 My Hospitals</a>
        <div class="pt-4 mt-4" style="border-top:1px solid var(--border)">
          <a href="/pages/doctor/profile.html" class="sidebar-item">👤 My Profile</a>
          <button onclick="Auth.logout()" class="sidebar-item w-full text-left" style="color:var(--red)">🚪 Sign Out</button>
        </div>
      </nav>
    </aside>

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-20 hidden lg:hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <!-- Main -->
    <main class="flex-1 lg:ml-[220px] overflow-y-auto">
      <header class="px-4 sm:px-6 py-4 flex items-center justify-between sticky top-0 z-10" style="background:rgba(7,14,28,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(34,211,238,.08)">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar()" class="lg:hidden p-2" style="color:var(--text2)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div>
            <h1 class="text-lg sm:text-xl font-bold font-serif">My Hospital Affiliations</h1>
            <p class="text-xs" style="color:var(--text3)">Hospitals where you practice</p>
          </div>
        </div>
      </header>

      <div class="p-4 sm:p-6 space-y-5">

        <!-- Hospital list -->
        <div id="hospitals-list">
          <div class="text-center py-16" style="color:var(--text3)">
            <div class="loading-spinner mx-auto mb-3"></div>
            <p class="text-sm">Loading hospital affiliations...</p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/js/notifications.js"></script>
  <script>
    Auth.requireRole('doctor');

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.toggle('hidden');
    }

    async function loadHospitals() {
      const el = document.getElementById('hospitals-list');
      try {
        const res = await API.get('/hospitals/doctor/my-hospitals');
        const hospitals = res.data.hospitals || [];

        if (!hospitals.length) {
          el.innerHTML = `
            <div class="text-center py-16" style="color:var(--text3)">
              <div class="text-5xl mb-4">🏥</div>
              <p class="text-sm font-medium">No hospital affiliations yet</p>
              <p class="text-xs mt-1">When a hospital adds you to their staff, it will appear here.</p>
            </div>
          `;
          return;
        }

        el.innerHTML = hospitals.map(h => `
          <div class="rounded-[18px] p-4 sm:p-6 mb-4 transition-all" style="background:var(--surface2);border:1px solid rgba(34,211,238,.1)" onmouseover="this.style.borderColor='rgba(34,211,238,.25)'" onmouseout="this.style.borderColor='rgba(34,211,238,.1)'">
            <div class="flex items-start gap-5">
              <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0" style="background:rgba(34,211,238,.08)">🏥</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <h3 class="font-bold text-lg">${h.name}</h3>
                  <span class="badge ${h.verification_status === 'verified' ? 'b-green' : 'b-yellow'} text-[11px]">${h.verification_status || 'pending'}</span>
                </div>
                <p class="text-xs mt-1" style="color:var(--text3)">${h.type ? h.type.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()) : 'Hospital'}</p>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-4">
                  <div class="p-3 rounded-xl" style="background:var(--bg);border:1px solid var(--border)">
                    <div class="text-[11px]" style="color:var(--text3)">Department</div>
                    <div class="text-sm font-semibold mt-0.5">${h.department || '—'}</div>
                  </div>
                  <div class="p-3 rounded-xl" style="background:var(--bg);border:1px solid var(--border)">
                    <div class="text-[11px]" style="color:var(--text3)">Position</div>
                    <div class="text-sm font-semibold mt-0.5">${h.position || '—'}</div>
                  </div>
                  <div class="p-3 rounded-xl" style="background:var(--bg);border:1px solid var(--border)">
                    <div class="text-[11px]" style="color:var(--text3)">Employment</div>
                    <div class="text-sm font-semibold mt-0.5">${h.employment_type ? h.employment_type.replace(/_/g, ' ') : '—'}</div>
                  </div>
                  <div class="p-3 rounded-xl" style="background:var(--bg);border:1px solid var(--border)">
                    <div class="text-[11px]" style="color:var(--text3)">Status</div>
                    <div class="text-sm font-semibold mt-0.5">${h.status === 'active' ? '🟢 Active' : h.status === 'on_leave' ? '🟡 On Leave' : '⚪ ' + (h.status || '—')}</div>
                  </div>
                </div>

                <div class="flex items-center gap-4 mt-4 flex-wrap">
                  ${h.city ? `<span class="text-xs" style="color:var(--text3)">📍 ${h.city}${h.state ? ', ' + h.state : ''}</span>` : ''}
                  ${h.phone ? `<span class="text-xs" style="color:var(--text3)">📞 ${h.phone}</span>` : ''}
                  ${h.email ? `<span class="text-xs" style="color:var(--text3)">✉️ ${h.email}</span>` : ''}
                </div>

                ${h.specializations ? `
                  <div class="flex flex-wrap gap-1.5 mt-3">
                    ${(typeof h.specializations === 'string' ? JSON.parse(h.specializations) : h.specializations).slice(0, 6).map(s => `<span class="px-2 py-0.5 text-[11px] rounded-full" style="background:rgba(34,211,238,.08);color:var(--cyan)">${s}</span>`).join('')}
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        el.innerHTML = `
          <div class="text-center py-12" style="color:var(--text3)">
            <div class="text-4xl mb-3">⚠️</div>
            <p class="text-sm">${err.message || 'Failed to load hospital affiliations'}</p>
          </div>
        `;
      }
    }

    loadHospitals();
  </script>
</body>
</html>
