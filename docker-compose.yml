version: '3.9'

services:

  # ── Node.js Application ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: healthconnect_app
    restart: unless-stopped
    ports:
      - '${PORT:-5000}:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-healthconnect_health}
      DB_USER: ${DB_USER:-healthconnect}
      DB_PASS: ${DB_PASS:-healthconnect_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      AT_API_KEY: ${AT_API_KEY}
      AT_USERNAME: ${AT_USERNAME}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      MOMO_SUBSCRIPTION_KEY: ${MOMO_SUBSCRIPTION_KEY}
      MOMO_API_USER: ${MOMO_API_USER}
      MOMO_API_KEY: ${MOMO_API_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5000}
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - healthconnect_net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── MySQL 8 ─────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: healthconnect_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-healthconnect_health}
      MYSQL_USER: ${DB_USER:-healthconnect}
      MYSQL_PASSWORD: ${DB_PASS:-healthconnect_password}
    ports:
      - '${DB_PORT_EXPOSED:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/database/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
    networks:
      - healthconnect_net
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_ROOT_PASS:-root_password}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: healthconnect_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - '${REDIS_PORT_EXPOSED:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - healthconnect_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy (production) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: healthconnect_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - app_uploads:/var/www/uploads:ro
    depends_on:
      - app
    networks:
      - healthconnect_net
    profiles:
      - production

volumes:
  mysql_data:
  redis_data:
  app_uploads:
  app_logs:

networks:
  healthconnect_net:
    driver: bridge
